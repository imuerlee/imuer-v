name: Build Android APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;28.2.13676358" "platforms;android-35" "platforms;android-36" "build-tools;34.0.0" 2>/dev/null || true

      - name: Download v2ray-core for Android
        run: |
          mkdir -p android/app/src/main/assets/v2ray
          V2RAY_VERSION="v5.22.0"
          V2RAY_URL="https://github.com/v2fly/v2ray-core/releases/download/${V2RAY_VERSION}/v2ray-android-arm64-v8a.zip"
          curl -L -o /tmp/v2ray.zip "$V2RAY_URL"
          unzip -j /tmp/v2ray.zip "v2ray" -d android/app/src/main/assets/v2ray/
          unzip -j /tmp/v2ray.zip "geoip.dat" -d android/app/src/main/assets/v2ray/
          unzip -j /tmp/v2ray.zip "geosite.dat" -d android/app/src/main/assets/v2ray/
          unzip -j /tmp/v2ray.zip "v2ray" -d android/app/src/main/assets/v2ray/
          chmod 755 android/app/src/main/assets/v2ray/v2ray
          ls -la android/app/src/main/assets/v2ray/

      - name: Generate debug keystore
        run: |
          cd android/app
          keytool -genkey -v -keystore nebula_vpn.keystore -alias nebula_vpn -keyalg RSA -keysize 2048 -validity 10000 -storepass nebula123456 -keypass nebula123456 -dname "CN=nebula_vpn, OU=nebula_vpn, O=nebula_vpn, L=nebula_vpn, S=nebula_vpn, C=US"

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties << EOF
          storePassword=nebula123456
          keyPassword=nebula123456
          keyAlias=nebula_vpn
          storeFile=nebula_vpn.keystore
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Run flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.upload_url }}
          asset_path: build/app/outputs/flutter-apk/app-release.apk
          asset_name: nebula_vpn-${{ github.ref_name }}-android.apk
          asset_content_type: application/vnd.android.package-archive
