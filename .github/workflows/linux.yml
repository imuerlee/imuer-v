name: Build Linux

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: git submodule update --init --recursive --depth 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: false

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Run flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Linux Release
        run: flutter build linux --release

      - name: Create Linux artifact
        shell: bash
        run: |
          mkdir -p linux_artifacts
          cd build/linux/x64/release/bundle
          tar -czvf $OLDPWD/linux_artifacts/nebula_vpn-linux.tar.gz .
          cd $OLDPWD
          ls -la linux_artifacts/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: linux_artifacts/nebula_vpn-linux.tar.gz
          retention-days: 14

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.upload_url }}
          asset_path: linux_artifacts/nebula_vpn-linux.tar.gz
          asset_name: nebula_vpn-${{ github.ref_name }}-linux.tar.gz
          asset_content_type: application/gzip
