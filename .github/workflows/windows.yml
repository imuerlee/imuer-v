name: Build Windows

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true
          cache-key: windows-stable-${{ hashFiles('**/pubspec.lock') }}
          cache-path: ${{ runner.homedir }}/flutter/.pub-cache

      - name: Get dependencies
        run: flutter pub get

      - name: Run flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/windows/runner/Release/
          retention-days: 14

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\runner\Release\*" -DestinationPath "NebulaVPN-windows.zip" -Force

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.upload_url }}
          asset_path: NebulaVPN-windows.zip
          asset_name: nebula_vpn-${{ github.ref_name }}-windows.zip
          asset_content_type: application/zip
