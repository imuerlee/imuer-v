name: Build Windows

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true
          cache-key: windows-stable-${{ hashFiles('**/pubspec.lock') }}
          cache-path: ${{ runner.homedir }}/flutter/.pub-cache

      - name: Get dependencies
        run: flutter pub get

      - name: Run flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Find built files
        id: find_files
        run: |
          echo "Checking build output..."
          Get-ChildItem -Path "build" -Recurse -Directory | ForEach-Object { $_.FullName }
          Get-ChildItem -Path "build/windows" -Recurse -Filter "*.exe" | ForEach-Object { $_.FullName }

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $releasePath = "build\windows\runner\Release"
          if (Test-Path $releasePath) {
            Compress-Archive -Path "$releasePath\*" -DestinationPath "NebulaVPN-windows.zip" -Force
            Write-Host "Created NebulaVPN-windows.zip"
            Get-ChildItem "NebulaVPN-windows.zip"
          } else {
            Write-Host "Release path not found, checking other locations..."
            Get-ChildItem -Path "build" -Recurse -Filter "*.exe" | Select-Object -First 5
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: NebulaVPN-windows.zip
          retention-days: 14

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.upload_url }}
          asset_path: NebulaVPN-windows.zip
          asset_name: nebula_vpn-${{ github.ref_name }}-windows.zip
          asset_content_type: application/zip
