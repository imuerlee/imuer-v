name: Build Windows

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true
          cache-key: windows-stable-${{ hashFiles('**/pubspec.lock') }}
          cache-path: ${{ runner.homedir }}/flutter/.pub-cache

      - name: Download v2ray-core for Windows
        shell: pwsh
        run: |
          $v2rayVersion = "v5.22.0"
          $url = "https://github.com/v2fly/v2ray-core/releases/download/${v2rayVersion}/v2ray-windows-64.zip"
          $outputPath = "$env:TEMP\v2ray.zip"
          $v2rayDir = "windows\v2ray"
          
          # Create v2ray directory
          New-Item -ItemType Directory -Force -Path $v2rayDir | Out-Null
          
          # Download v2ray-core
          Write-Host "Downloading v2ray-core from $url"
          Invoke-WebRequest -Uri $url -OutFile $outputPath -UseBasicParsing
          
          # Extract v2ray.exe
          Write-Host "Extracting v2ray-core..."
          Expand-Archive -Path $outputPath -DestinationPath "$env:TEMP\v2ray" -Force
          Copy-Item -Path "$env:TEMP\v2ray\v2ray.exe" -Destination $v2rayDir -Force
          Copy-Item -Path "$env:TEMP\v2ray\geoip.dat" -Destination $v2rayDir -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "$env:TEMP\v2ray\geosite.dat" -Destination $v2rayDir -Force -ErrorAction SilentlyContinue
          
          # List files
          Get-ChildItem $v2rayDir

      - name: Get dependencies
        run: flutter pub get

      - name: Run flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Find and copy release files
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "build" -Recurse -Filter "nebula_vpn.exe" | Select-Object -First 1
          if ($exe) {
            $releaseDir = $exe.Directory.FullName
            Write-Host "Found release directory: $releaseDir"
            Copy-Item -Path "$releaseDir\*" -Destination "build\windows\runner\Release" -Recurse -Force -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Path "build\windows\runner\Release" -Force | Out-Null
            Copy-Item -Path "$releaseDir\*" -Destination "build\windows\runner\Release" -Recurse -Force
            Write-Host "Files copied successfully"
          } else {
            Write-Host "ERROR: nebula_vpn.exe not found"
            Get-ChildItem -Path "build" -Recurse -Filter "*.exe" | Select-Object -First 10
          }

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $releasePath = "build\windows\runner\Release"
          if (Test-Path $releasePath) {
            Compress-Archive -Path "$releasePath\*" -DestinationPath "NebulaVPN-windows.zip" -Force
            Write-Host "Created NebulaVPN-windows.zip"
            Get-ChildItem "NebulaVPN-windows.zip"
          } else {
            Write-Host "ERROR: Release path not found at $releasePath"
            exit 1
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: NebulaVPN-windows.zip
          retention-days: 14

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.upload_url }}
          asset_path: NebulaVPN-windows.zip
          asset_name: nebula_vpn-${{ github.ref_name }}-windows.zip
          asset_content_type: application/zip
