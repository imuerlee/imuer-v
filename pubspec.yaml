name: nebula_vpn
description: "A cross-platform VPN client with sci-fi themed UI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  
  # Dependency Injection
  get_it: ^8.0.3
  
  # Storage
  shared_preferences: ^2.5.3
  sqflite: ^2.3.0
  sqflite_common_ffi: 2.3.0
  path_provider: ^2.1.5
  path: ^1.9.0
  
  # Network
  dio: ^5.8.0
  connectivity_plus: ^6.1.4
  
  # Utilities
  uuid: ^4.5.1
  intl: any
  share_plus: ^10.0.0
  
  # QR Code Scanner
  mobile_scanner: ^6.0.0
  
  # File Picker
  file_picker: ^8.0.0
  
  # UI Components
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  percent_indicator: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# 解决 sqlite3 API 不兼容问题 - sqlite3 >=2.9.0 移除了 close() 方法
# 必须使用 <2.9.0 的版本
dependency_overrides:
  sqlite3: '>=2.1.0 <2.9.0'

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - assets/images/
